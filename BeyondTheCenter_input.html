<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeyondTheCenter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      border-radius: 0;
    }

    body {
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 0;
    }

    .network {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.45;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(100%, 560px);
      border: 1px solid #fff;
      background: #000;
      padding: 28px;
      border-radius: 0;
    }

    .top-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #fff;
      padding-bottom: 12px;
      margin-bottom: 28px;
      gap: 16px;
    }

    .title {
      font-size: clamp(28px, 7vw, 58px);
      line-height: 0.92;
      letter-spacing: -0.06em;
      font-weight: 700;
    }

    .index {
      font-size: 12px;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .label {
      display: block;
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      color: #d9d9d9;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      border: 1px solid #fff;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      height: 56px;
      background: #000;
      color: #fff;
      border: 0;
      border-radius: 0;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }

    input::placeholder {
      color: #777;
    }

    button {
      height: 56px;
      min-width: 112px;
      background: #fff;
      color: #000;
      border: 0;
      border-left: 1px solid #fff;
      border-radius: 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    button:active {
      background: #000;
      color: #fff;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid #fff;
      margin-top: 28px;
      padding-top: 14px;
      gap: 12px;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.08em;
      line-height: 1.5;
    }

    .status {
      min-height: 20px;
      margin-top: 14px;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.04em;
    }

    .recent {
      margin-top: 24px;
      border-top: 1px solid #fff;
      padding-top: 14px;
    }

    .recent-title {
      font-size: 12px;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      color: #aaa;
    }

    .recent-list {
      display: grid;
      gap: 8px;
    }

    .recent-item {
      display: grid;
      grid-template-columns: 44px 1fr;
      border: 1px solid rgba(255,255,255,0.45);
      min-height: 34px;
      font-size: 13px;
      line-height: 34px;
    }

    .recent-item span:first-child {
      border-right: 1px solid rgba(255,255,255,0.45);
      text-align: center;
      color: #aaa;
    }

    .recent-item span:last-child {
      padding: 0 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .panel {
        padding: 20px;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
        border-left: 0;
        border-top: 1px solid #fff;
      }

      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <canvas class="network" id="network"></canvas>

  <main class="page">
    <section class="panel">
      <div class="top-line">
        <h1 class="title">Beyond<br>TheCenter</h1>
        <div class="index">LIVE INPUT<br>NODE TEXT</div>
      </div>

      <label class="label" for="messageInput">관람객의 단어 또는 문장을 입력해주세요.</label>

      <form id="inputForm" class="input-row">
        <input id="messageInput" type="text" maxlength="40" placeholder="type here" autocomplete="off" required />
        <button type="submit">SEND</button>
      </form>

      <p id="status" class="status">READY</p>

      <div class="recent">
        <div class="recent-title">RECENT INPUT</div>
        <div id="recentList" class="recent-list"></div>
      </div>

      <div class="meta">
        <div>QR ACCESS / FIREBASE DATABASE</div>
        <div>BLACK WHITE / NO RADIUS / NO SHADOW</div>
      </div>
    </section>
  </main>

  <script type="module">
    // 1. Firebase 콘솔 > 프로젝트 설정 > 내 앱 > 웹 앱에서 firebaseConfig를 복사해서 아래에 붙여넣기
    const firebaseConfig = {
    apiKey: "AIzaSyAuSEeBiwOjghjm0gIu_4Hc5ISjmeFRDNc",
    authDomain: "yebumko.firebaseapp.com",
    databaseURL: "https://yebumko-default-rtdb.firebaseio.com",
    projectId: "yebumko",
    storageBucket: "yebumko.firebasestorage.app",
    messagingSenderId: "947768345840",
    appId: "1:947768345840:web:d6f5b855aaccc2988a2e35"
  };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp, query, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById("inputForm");
    const input = document.getElementById("messageInput");
    const status = document.getElementById("status");
    const recentList = document.getElementById("recentList");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = input.value.trim();
      if (!text) return;

      status.textContent = "SENDING...";

      try {
        await push(ref(db, "messages"), {
          text,
          createdAt: serverTimestamp()
        });

        input.value = "";
        status.textContent = "SENT";
        setTimeout(() => {
          status.textContent = "READY";
        }, 1200);
      } catch (error) {
        console.error(error);
        status.textContent = "ERROR: FIREBASE CONFIG / RULES 확인";
      }
    });

    const recentQuery = query(ref(db, "messages"), limitToLast(5));
    onValue(recentQuery, (snapshot) => {
      const data = snapshot.val();
      recentList.innerHTML = "";

      if (!data) {
        recentList.innerHTML = `<div class="recent-item"><span>00</span><span>no input yet</span></div>`;
        return;
      }

      const items = Object.values(data).reverse();
      items.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "recent-item";
        row.innerHTML = `<span>${String(index + 1).padStart(2, "0")}</span><span>${escapeHTML(item.text || "")}</span>`;
        recentList.appendChild(row);
      });
    });

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, tag => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[tag]));
    }

    // 배경 네트워크 애니메이션: TouchDesigner 파일 무드 참고용, DB 기능과 무관
    const canvas = document.getElementById("network");
    const ctx = canvas.getContext("2d");
    let w, h, points;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      points = Array.from({ length: 70 }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.lineWidth = 1;

      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;

        ctx.fillRect(p.x - 2, p.y - 2, 4, 4);

        for (let j = i + 1; j < points.length; j++) {
          const q = points[j];
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 170) {
            ctx.globalAlpha = 1 - dist / 170;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.stroke();
            ctx.globalAlpha = 1;
          }
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);
    resize();
    draw();
  </script>
</body>
</html>
